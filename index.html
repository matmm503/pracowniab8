<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekskluzywnyy Salon Fryzjerski</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- KROK 1: Preloader -->
    <div class="preloader">
        <!-- Wygenerowane eleganckie logo w odpowiednich kolorach -->
        <img src="https://placehold.co/400x200/161a18/d7c4a5?text=SALON\nPREMIUM&font=playfair-display" alt="Logo Salonu" class="preloader-logo">
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </div>

    <!-- KROK 2: Sekcja Hero -->
    <main>
        <section class="hero">
            <!-- Liście pobrane z Unsplash (na czarnym tle, które usuniemy w CSS) -->
            <img src="https://images.unsplash.com/photo-1597055181300-e3633a0174ec?q=80&w=800&auto=format&fit=crop" alt="" class="jungle-leaf leaf-1">
            <img src="https://images.unsplash.com/photo-1587324438673-56c8972e09dd?q=80&w=800&auto=format&fit=crop" alt="" class="jungle-leaf leaf-2">
            <img src="https://images.unsplash.com/photo-1616428383921-9e5c53106cc0?q=80&w=800&auto=format&fit=crop" alt="" class="jungle-leaf leaf-3">
            <img src="https://images.unsplash.com/photo-1591129486280-92cb71a39151?q=80&w=800&auto=format&fit=crop" alt="" class="jungle-leaf leaf-4">

            <!-- Główna zawartość -->
            <div class="hero-content">
                <h1 class="hero-title">Odkryj swoje piękno na nowo</h1>
                <p class="hero-subtitle">Ekskluzywne doświadczenie dla Twoich włosów. <br>Harmonia natury i nowoczesnego luksusu.</p>
                <a href="#" class="btn-primary">Zarezerwuj wizytę (Booksy)</a>
            </div>
        </section>

        <!-- Sekcja pomocnicza -->
        <section class="spacer">
            <h2>Przewijaj dalej, aby doświadczyć harmonii...</h2>
        </section>
    </main>

    <!-- Biblioteki GSAP -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
